services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sre_postgres
    environment:
      POSTGRES_DB: sre_triage
      POSTGRES_USER: sre_user
      POSTGRES_PASSWORD: sre_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 intentionally NOT exposed externally — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre_user -d sre_triage"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Mailhog (local SMTP catcher — web UI at localhost:8025) ───────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sre_mailhog
    ports:
      - "8025:8025"   # Web UI — open in browser to see captured emails
      # Port 1025 (SMTP) is internal only — backend connects via mailhog:1025
    restart: unless-stopped

  # ── Backend (FastAPI + PydanticAI + Gemini) ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sre_backend
    environment:
      DATABASE_URL: postgresql://sre_user:sre_pass@db:5432/sre_triage
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://us.cloud.langfuse.com}
      # Slack (real webhook)
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      # Jira (real REST API)
      JIRA_SITE_URL: ${JIRA_SITE_URL}
      JIRA_USER_EMAIL: ${JIRA_USER_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY:-SRE}
      # Email / SMTP (Mailhog container)
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-sre-agent@agentx.local}
      SRE_TEAM_EMAIL: ${SRE_TEAM_EMAIL:-sre-team@agentx.local}
      UPLOAD_DIR: /app/uploads
      ESHOP_CONTEXT_PATH: /app/context-provider/ecommerce-repo/src
    volumes:
      - uploads_data:/app/uploads
      - ./context-provider:/app/context-provider:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── Frontend (Vite + React + Tailwind) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sre_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
